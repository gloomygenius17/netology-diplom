---
- name: Install Kibana
  hosts: kibana_server
  become: yes
  vars:
    elasticsearch_host: "{{ hostvars['elasticsearch.ru-central1.internal']['ansible_default_ipv4']['address'] }}"
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Run Kibana container
      docker_container:
        name: kibana
        image: docker.elastic.co/kibana/kibana:8.11.0
        state: started
        restart_policy: unless-stopped
        ports:
          - "5601:5601"
        env:
          ELASTICSEARCH_HOSTS: "http://{{ elasticsearch_host }}:9200"
