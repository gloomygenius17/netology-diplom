---
- name: Install and configure zabbix-agent on all VMs
  hosts: all
  become: yes
  vars:
    zabbix_server_host: "{{ hostvars['zabbix.ru-central1.internal']['ansible_default_ipv4']['address'] }}"
  tasks:
    - name: Install zabbix-agent
      apt:
        name: zabbix-agent
        state: present
        update_cache: yes

    - name: Create zabbix-agent config from template
      template:
        src: zabbix_agentd.conf.j2
        dest: /etc/zabbix/zabbix_agentd.conf
        owner: root
        group: root
        mode: '0644'
      notify: restart zabbix-agent

    - name: Create log directory
      file:
        path: /var/log/zabbix
        state: directory
        owner: zabbix
        group: zabbix

  handlers:
    - name: restart zabbix-agent
      systemd:
        name: zabbix-agent
        state: restarted
        enabled: yes
