---
- name: Install and configure filebeat on web servers
  hosts: webservers
  become: yes
  vars:
    elasticsearch_host: "{{ hostvars['elasticsearch.ru-central1.internal']['ansible_default_ipv4']['address'] }}"
  tasks:
    - name: Download filebeat deb package from mirror
      get_url:
        url: https://mirror.yandex.ru/mirrors/elastic/8/pool/main/f/filebeat/filebeat-8.15.0-amd64.deb
        dest: /tmp/filebeat.deb
        mode: '0644'

    - name: Install filebeat
      apt:
        deb: /tmp/filebeat.deb
        state: present

    - name: Create filebeat config from template
      template:
        src: filebeat.yml.j2
        dest: /etc/filebeat/filebeat.yml
        owner: root
        group: root
        mode: '0644'
      notify: restart filebeat

  handlers:
    - name: restart filebeat
      systemd:
        name: filebeat
        state: restarted
        enabled: yes
