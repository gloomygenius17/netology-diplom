---
- name: Install filebeat on web servers
  hosts: webservers
  become: yes
  vars:
    elasticsearch_ip: "10.10.1.5"
  tasks:
    - name: Install filebeat from deb
      apt:
        deb: /tmp/filebeat-8.9.2-amd64.deb
        state: present

    - name: Configure filebeat
      copy:
        dest: /etc/filebeat/filebeat.yml
        content: |
          filebeat.inputs:
          - type: log
            enabled: true
            paths:
              - /var/log/nginx/access.log
            fields:
              log_type: nginx_access
              host: {{ ansible_hostname }}

          - type: log
            enabled: true
            paths:
              - /var/log/nginx/error.log
            fields:
              log_type: nginx_error
              host: {{ ansible_hostname }}

          output.elasticsearch:
            hosts: ["{{ elasticsearch_ip }}:9200"]
            indices:
              - index: "nginx-logs-%{+yyyy.MM.dd}"

    - name: Start filebeat
      systemd:
        name: filebeat
        state: restarted
        enabled: yes
